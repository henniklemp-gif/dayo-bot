<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Kühlschrank</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      min-height: 100vh;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      overscroll-behavior: none;
    }

    /* ── Sticky top ──────────────────────────────────────────────────────────── */

    .sticky-top {
      position: sticky;
      top: 0;
      background: var(--tg-theme-bg-color, #fff);
      z-index: 20;
      padding-bottom: 8px;
      border-bottom: 1px solid color-mix(in srgb, var(--tg-theme-hint-color, #ccc) 25%, transparent);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 8px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      border-radius: 50%;
      color: var(--tg-theme-link-color, #2481cc);
      transition: opacity 0.2s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .header-btn img, .header-btn svg { display: block; }
    .header-btn:active { transform: scale(0.88); }
    .header-btn.open { transform: rotate(45deg); }

    .undo-btn { opacity: 0.25; }
    .undo-btn:not(:disabled) { opacity: 1; }

    #search-wrap { padding: 0 12px; }

    #search {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 12px;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #000);
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
    }
    #search::placeholder { color: var(--tg-theme-hint-color, #8e8e93); }

    /* ── Skeleton ────────────────────────────────────────────────────────────── */

    .skeleton-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid color-mix(in srgb, var(--tg-theme-hint-color, #ccc) 18%, transparent);
    }

    .skel {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      background: linear-gradient(
        90deg,
        var(--tg-theme-secondary-bg-color, #f0f0f0) 25%,
        color-mix(in srgb, var(--tg-theme-secondary-bg-color, #f0f0f0) 55%, var(--tg-theme-bg-color, #fff)) 50%,
        var(--tg-theme-secondary-bg-color, #f0f0f0) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skel-text  { height: 16px; flex: 1; }
    .skel-btn   { width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0; }

    /* ── Kategorie-Gruppen ───────────────────────────────────────────────────── */

    .category-header {
      position: sticky;
      top: var(--sticky-offset, 76px);
      z-index: 10;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--tg-theme-hint-color, #666);
      background: var(--tg-theme-bg-color, #fff);
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid color-mix(in srgb, var(--tg-theme-hint-color, #ccc) 15%, transparent);
    }

    .category-count { font-weight: 400; opacity: 0.7; }

    .group-empty {
      padding: 10px 16px;
      font-size: 13px;
      font-style: italic;
      color: var(--tg-theme-hint-color, #999);
    }

    /* ── Items ───────────────────────────────────────────────────────────────── */

    .item-wrap {
      position: relative;
      overflow: hidden;
    }

    .swipe-bg {
      position: absolute;
      inset: 0 0 0 auto;
      width: 72px;
      background: #ff3b30;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid color-mix(in srgb, var(--tg-theme-hint-color, #ccc) 18%, transparent);
      background: var(--tg-theme-bg-color, #fff);
      will-change: transform;
      touch-action: pan-y;
      transition: opacity 0.2s;
      cursor: pointer;
    }

    .item.swiping { transition: none; }

    .item.removing {
      opacity: 0;
      transform: translateX(100%);
      transition: transform 0.22s ease, opacity 0.22s;
    }

    .item.zeroed { opacity: 0.55; }
    .item.zeroed .item-name { text-decoration: line-through; }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 15px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Pills & Badges ──────────────────────────────────────────────────────── */

    .info-pill {
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #000);
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .expiry-badge {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .expiry-badge.soon    { background: color-mix(in srgb, #ff9500 15%, transparent); color: #ff9500; }
    .expiry-badge.expired { background: color-mix(in srgb, #ff3b30 15%, transparent); color: #ff3b30; }

    /* ── Buttons ─────────────────────────────────────────────────────────────── */

    .btn {
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-size: 17px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.84); }

    .bring-btn {
      color: var(--tg-theme-button-color, #2481cc);
      background: color-mix(in srgb, var(--tg-theme-button-color, #2481cc) 12%, transparent);
    }
    .bring-btn.done {
      background: color-mix(in srgb, #34c759 18%, transparent);
      color: #34c759;
    }

    @keyframes bringPulse {
      0%   { transform: scale(1);    background: color-mix(in srgb, var(--tg-theme-button-color, #2481cc) 12%, transparent); }
      40%  { transform: scale(1.25); background: color-mix(in srgb, #34c759 45%, transparent); color: #34c759; }
      100% { transform: scale(1);    background: color-mix(in srgb, var(--tg-theme-button-color, #2481cc) 12%, transparent); }
    }

    .bring-btn.pulse {
      animation: bringPulse 0.55s ease-in-out 3;
    }

    .remove-btn {
      background: color-mix(in srgb, #ff3b30 12%, transparent);
      color: #ff3b30;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 20px;
      font-weight: 300;
      line-height: 1;
    }

    .minus-btn {
      background: color-mix(in srgb, #ff3b30 12%, transparent);
      color: #ff3b30;
    }
    .plus-btn {
      background: color-mix(in srgb, #34c759 12%, transparent);
      color: #34c759;
    }
    .qty-btn.pressing {
      filter: brightness(0.85);
    }

    .qty-display {
      min-width: 44px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--tg-theme-text-color, #000);
    }

    /* ── Empty / Error ───────────────────────────────────────────────────────── */

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--tg-theme-hint-color, #888);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── Barcode-Scanner ─────────────────────────────────────────────────────── */

    #scan-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 50;
    }
    #scan-overlay.visible { display: block; }

    #scan-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scan-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 78%;
      max-width: 320px;
      aspect-ratio: 16 / 9;
      border: 3px solid #fff;
      border-radius: 12px;
      box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.45);
      pointer-events: none;
    }

    #scan-close-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #scan-hint {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 14px;
      opacity: 0.85;
    }

    /* ── Bottom Sheets (Add & Detail) ────────────────────────────────────────── */

    .sheet-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 40;
    }
    .sheet-backdrop.visible { display: block; }

    .bottom-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--tg-theme-bg-color, #fff);
      border-radius: 20px 20px 0 0;
      padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 24px);
      z-index: 41;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 85vh;
      overflow-y: auto;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--tg-theme-hint-color, #ccc);
      margin: 10px auto 18px;
    }

    .sheet-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .detail-header .sheet-title {
      margin-bottom: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-delete-btn {
      background: color-mix(in srgb, #ff3b30 12%, transparent);
      color: #ff3b30;
    }

    .sheet-field {
      margin-bottom: 12px;
    }

    .sheet-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--tg-theme-hint-color, #888);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .sheet-field input {
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 12px;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #000);
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
    }

    .qty-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .unit-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: none;
      background: var(--tg-theme-secondary-bg-color, #f2f2f7);
      color: var(--tg-theme-text-color, #000);
      font-size: 13px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .chip.active {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
    }

    #add-btn {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    #add-btn:disabled { opacity: 0.45; }
    #add-btn:not(:disabled):active { opacity: 0.8; }

    /* ── Füllstand-Slider ────────────────────────────────────────────────────── */

    .detail-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(
        to right,
        var(--fill-color, #34c759) 0%,
        var(--fill-color, #34c759) var(--fill-pct, 100%),
        var(--tg-theme-secondary-bg-color, #e5e5ea) var(--fill-pct, 100%),
        var(--tg-theme-secondary-bg-color, #e5e5ea) 100%
      );
      outline: none;
      margin: 14px 0 6px;
    }
    .detail-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid var(--fill-color, #34c759);
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      cursor: pointer;
    }
    .detail-slider::-moz-range-track {
      height: 6px;
      border-radius: 3px;
      background: transparent;
    }
    .detail-slider::-moz-range-progress {
      height: 6px;
      border-radius: 3px;
      background: var(--fill-color, #34c759);
    }
    .detail-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid var(--fill-color, #34c759);
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      cursor: pointer;
    }

    .slider-readout {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .slider-readout .pct { font-size: 20px; font-weight: 700; }
    .slider-readout .abs { font-size: 13px; color: var(--tg-theme-hint-color, #888); }
  </style>
</head>
<body>
  <div class="sticky-top">
    <header>
      <span class="header-title">🧊 Kühlschrank</span>
      <div class="header-actions">
        <button id="scan-btn" class="header-btn" title="Barcode scannen"><img src="Emojis/E1D9.svg" alt="Barcode scannen" width="20" height="20"></button>
        <button id="fab" class="header-btn" title="Hinzufügen"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 3V17M3 10H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button id="undo-btn" class="header-btn undo-btn" disabled title="Rückgängig">↩</button>
      </div>
    </header>
    <div id="search-wrap">
      <input id="search" type="search" placeholder="🔍 Suchen…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>

  <div id="items-list"></div>

  <!-- Add-Sheet -->
  <div id="sheet-overlay" class="sheet-backdrop"></div>
  <div id="sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Artikel hinzufügen</div>

    <div class="sheet-field">
      <label>Name</label>
      <input id="inp-name" type="text" placeholder="z.B. Original Stracke Salami" autocomplete="off">
    </div>

    <div class="qty-row">
      <div class="sheet-field">
        <label>Menge (optional)</label>
        <input id="inp-qty" type="number" placeholder="z.B. 3" min="0" step="any">
      </div>
      <div class="sheet-field">
        <label>Einheit</label>
        <input id="inp-unit" type="text" placeholder="Stk, g, ml …" autocomplete="off">
      </div>
    </div>

    <div class="unit-chips" id="add-unit-chips">
      <button class="chip" data-unit="Stk">Stk</button>
      <button class="chip" data-unit="g">g</button>
      <button class="chip" data-unit="kg">kg</button>
      <button class="chip" data-unit="ml">ml</button>
      <button class="chip" data-unit="l">l</button>
      <button class="chip" data-unit="Pkg">Pkg</button>
    </div>

    <div class="sheet-field" style="margin-top: 16px;">
      <label>Kategorie</label>
      <div class="unit-chips" id="add-category-chips">
        <button class="chip" data-category="kuehlschrank">🧊 Kühlschrank</button>
        <button class="chip" data-category="tiefkuehlfach">❄️ Tiefkühlfach</button>
        <button class="chip" data-category="speisekammer">🥫 Speisekammer</button>
      </div>
    </div>

    <button id="add-btn" disabled>Hinzufügen</button>
  </div>

  <!-- Detail-Sheet -->
  <div id="detail-overlay" class="sheet-backdrop"></div>
  <div id="detail-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="detail-header">
      <div class="sheet-title" id="detail-name"></div>
      <button id="detail-delete-btn" class="btn detail-delete-btn" title="Artikel löschen">🗑️</button>
    </div>

    <div class="sheet-field">
      <label>Kategorie</label>
      <div class="unit-chips" id="detail-category-chips">
        <button class="chip" data-category="kuehlschrank">🧊 Kühlschrank</button>
        <button class="chip" data-category="tiefkuehlfach">❄️ Tiefkühlfach</button>
        <button class="chip" data-category="speisekammer">🥫 Speisekammer</button>
      </div>
    </div>

    <div class="sheet-field">
      <label>Mindesthaltbarkeit</label>
      <input id="detail-expiry" type="date">
      <div class="unit-chips" id="detail-expiry-chips">
        <button class="chip" data-days="3">+3 Tage</button>
        <button class="chip" data-days="7">+1 Woche</button>
        <button class="chip" data-days="14">+2 Wochen</button>
        <button class="chip" data-days="30">+1 Monat</button>
        <button class="chip" id="detail-expiry-clear">Entfernen</button>
      </div>
    </div>

    <div class="sheet-field" id="detail-amount-field">
      <label>Menge</label>
      <div id="detail-slider-block">
        <input id="detail-slider" class="detail-slider" type="range" min="0" max="100" step="5">
        <div class="slider-readout">
          <span class="pct" id="detail-slider-pct"></span>
          <span class="abs" id="detail-slider-abs"></span>
        </div>
      </div>
      <div id="detail-stepper-block" class="qty-control">
        <button class="btn qty-btn minus-btn" id="detail-minus-btn">−</button>
        <span class="qty-display" id="detail-stepper-display"></span>
        <button class="btn qty-btn plus-btn" id="detail-plus-btn">+</button>
      </div>
    </div>
  </div>

  <div id="scan-overlay">
    <video id="scan-video" autoplay muted playsinline></video>
    <div class="scan-frame"></div>
    <button id="scan-close-btn" title="Schließen">✕</button>
    <div id="scan-hint">Barcode ins Bild halten…</div>
  </div>

  <script src="https://unpkg.com/@zxing/library@0.21.3"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const initData = tg.initData || '';
    const headers = { 'Authorization': initData, 'Content-Type': 'application/json' };

    // Items zeroed in this session – deleted on pagehide
    const zeroedItems = new Set();
    let allItems = [];
    let currentItem = null; // aktuell im Detail-Sheet geöffneter Artikel

    // ── KATEGORIEN ────────────────────────────────────────────────────────────

    const CATEGORY_ORDER = ['kuehlschrank', 'tiefkuehlfach', 'speisekammer'];
    const CATEGORY_META = {
      kuehlschrank:  { label: 'Kühlschrank',  icon: '🧊' },
      tiefkuehlfach: { label: 'Tiefkühlfach', icon: '❄️' },
      speisekammer:  { label: 'Speisekammer', icon: '🥫' },
    };
    const MEASURABLE_UNITS = ['g', 'kg', 'ml', 'l'];

    function isMeasurableUnit(unit) {
      return !!unit && MEASURABLE_UNITS.includes(unit.toLowerCase());
    }

    function guessCategory(name) {
      const n = name.toLowerCase();

      if (/tiefgekühlt|tiefkühl|\btk[\s-]|pommes|fischstäbchen|eiscreme|\beis\b|garnele|shrimp/.test(n)) return 'tiefkuehlfach';

      if (/milch|milk|käse|cheese|butter|joghurt|yogurt|sahne|creme fraiche|schmand|quark|\bei\b|eier|salami|wurst|schinken|fleisch|hack|schnitzel|hähnchen|hühnchen|fisch|lachs|thunfisch|forelle|hering|karotte|möhre|tomate|paprika|gurke|salat|rucola|spinat|brokkoli|champignon|pilz|apfel|banane|orange|mandarine|zitrone|erdbeere|traube|heidelbeere|blaubeere|avocado|mayo|mayonnaise/.test(n)) return 'kuehlschrank';

      if (/zwiebel|knoblauch|kartoffel|mais|honig|marmelade|konfitüre|senf|ketchup|saft|juice|wasser|bier|wein|brot|brötchen|toast|öl\b|oil|schokolade|schoko|pizza|nudel|pasta|reis|mehl|zucker|salz|gewürz|konserve|dose|linsen|müsli|hafer|kaffee|\btee\b/.test(n)) return 'speisekammer';

      return 'kuehlschrank';
    }

    // ── SKELETON ──────────────────────────────────────────────────────────────

    function renderSkeleton() {
      document.getElementById('items-list').innerHTML = Array(6).fill('').map(() => `
        <div class="skeleton-item">
          <div class="skel skel-text"></div>
          <div class="skel skel-btn"></div>
        </div>`).join('');
    }

    // ── RENDER ────────────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function updateStickyOffset() {
      const el = document.querySelector('.sticky-top');
      if (el) document.documentElement.style.setProperty('--sticky-offset', el.offsetHeight + 'px');
    }

    function renderItems(items) {
      allItems = items;
      applyFilter(document.getElementById('search').value);
      updateStickyOffset();
    }

    function renderExpiryBadge(expiryDate) {
      if (!expiryDate) return '';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const exp = new Date(expiryDate + 'T00:00:00');
      const diffDays = Math.round((exp - today) / 86400000);
      if (diffDays < 0) return `<span class="expiry-badge expired">Abgelaufen</span>`;
      if (diffDays <= 3) return `<span class="expiry-badge soon">${diffDays === 0 ? 'Heute' : `in ${diffDays} Tag${diffDays > 1 ? 'en' : ''}`}</span>`;
      return '';
    }

    function renderItemRow(item) {
      const hasQty = item.quantity != null;
      const unit    = item.unit ?? '';
      const zeroed  = zeroedItems.has(item.name);
      const dispQty = zeroed ? 0 : item.quantity;
      const measurable = hasQty && isMeasurableUnit(unit) && item.fullQuantity;

      let pill = '';
      if (hasQty) {
        if (measurable) {
          const pct = zeroed ? 0 : Math.round((dispQty / item.fullQuantity) * 100);
          pill = `<span class="info-pill">${pct}%</span>`;
        } else {
          pill = `<span class="info-pill">${dispQty}${unit ? ' ' + escHtml(unit) : ''}</span>`;
        }
      }

      const controls = hasQty
        ? ''
        : `<button class="btn remove-btn" data-action="remove">✓</button>`;

      return `
        <div class="item-wrap">
          <div class="swipe-bg">🗑️</div>
          <div class="item${zeroed ? ' zeroed' : ''}" data-name="${escHtml(item.name)}">
            <div class="item-info">
              <div class="item-name">${escHtml(item.name)}</div>
            </div>
            ${renderExpiryBadge(item.expiryDate)}
            ${pill}
            <button class="btn bring-btn${zeroed ? ' pulse' : ''}" data-action="bring">🛒</button>
            ${controls}
          </div>
        </div>`;
    }

    function renderGroup(cat, items) {
      const meta = CATEGORY_META[cat];
      const body = items.length
        ? items.map(renderItemRow).join('')
        : '<div class="group-empty">Keine Artikel</div>';
      return `
        <div class="category-group">
          <div class="category-header">${meta.icon} ${meta.label} <span class="category-count">${items.length}</span></div>
          ${body}
        </div>`;
    }

    function applyFilter(query = '') {
      const q = query.toLowerCase().trim();
      const filtered = q ? allItems.filter(i => i.name.toLowerCase().includes(q)) : allItems;
      const container = document.getElementById('items-list');

      if (!allItems.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🫙</div><p>Kühlschrank ist leer</p></div>';
        return;
      }
      if (q && !filtered.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>Nichts gefunden</p></div>';
        return;
      }

      container.innerHTML = CATEGORY_ORDER.map(cat => {
        const items = filtered.filter(i => (i.category || 'kuehlschrank') === cat);
        if (q && !items.length) return '';
        return renderGroup(cat, items);
      }).join('');

      document.querySelectorAll('.item-wrap').forEach(attachSwipe);
    }

    // ── SWIPE TO DELETE ───────────────────────────────────────────────────────

    function attachSwipe(wrap) {
      const item = wrap.querySelector('.item');
      if (!item) return;

      let startX = 0, startY = 0, dx = 0, active = false;
      const THRESHOLD = 72;

      item.addEventListener('touchstart', e => {
        if (e.target.closest('.btn')) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        dx = 0; active = false;
      }, { passive: true });

      item.addEventListener('touchmove', e => {
        if (!startX) return;
        const moveX = e.touches[0].clientX - startX;
        const moveY = e.touches[0].clientY - startY;

        if (!active) {
          if (Math.abs(moveX) < 4 && Math.abs(moveY) < 4) return;
          if (Math.abs(moveY) > Math.abs(moveX)) { startX = 0; return; }
          active = true;
        }

        dx = Math.min(0, moveX);
        item.classList.add('swiping');
        item.style.transform = `translateX(${dx}px)`;
        e.preventDefault();
      }, { passive: false });

      item.addEventListener('touchend', () => {
        if (!active) return;
        startX = 0; active = false;
        item.classList.remove('swiping');

        if (dx < -THRESHOLD) {
          deleteItem(item.dataset.name, item, wrap);
        } else {
          item.style.transition = 'transform 0.22s ease';
          item.style.transform = '';
          setTimeout(() => item.style.transition = '', 220);
        }
        dx = 0;
      }, { passive: true });
    }

    // ── ACTIONS ───────────────────────────────────────────────────────────────

    function enableUndo() {
      document.getElementById('undo-btn').disabled = false;
    }

    async function handleUndo() {
      const btn = document.getElementById('undo-btn');
      btn.disabled = true;
      const res = await fetch('/api/fridge/undo', { method: 'POST', headers });
      const { success, items } = await res.json();
      if (success) {
        zeroedItems.clear();
        renderItems(items);
        tg.HapticFeedback?.notificationOccurred('success');
      } else {
        tg.HapticFeedback?.notificationOccurred('error');
      }
    }

    async function deleteItem(name, itemEl, wrap) {
      const target = wrap ?? itemEl.closest('.item-wrap');
      itemEl.classList.add('removing');
      await fetch(`/api/fridge/${encodeURIComponent(name)}`, { method: 'DELETE', headers });
      allItems = allItems.filter(i => i.name !== name);
      zeroedItems.delete(name);
      setTimeout(() => {
        applyFilter(document.getElementById('search').value);
      }, 220);
      tg.HapticFeedback?.notificationOccurred('success');
      enableUndo();
    }

    async function addToBring(name, btn) {
      btn.disabled = true;
      try {
        await fetch('/api/fridge/bring', {
          method: 'POST', headers, body: JSON.stringify({ name }),
        });
        btn.classList.remove('pulse');
        btn.classList.add('done');
        btn.textContent = '✓';
        tg.HapticFeedback?.notificationOccurred('success');
      } catch {
        btn.disabled = false;
        tg.HapticFeedback?.notificationOccurred('error');
      }
    }

    // ── AUTO-REPEAT (für Stepper im Detail-Sheet) ────────────────────────────

    let repeatTimer = null, repeatInterval = null;

    function startRepeat(fn) {
      fn();
      repeatTimer = setTimeout(() => { repeatInterval = setInterval(fn, 140); }, 500);
    }

    function stopRepeat() {
      clearTimeout(repeatTimer);
      clearInterval(repeatInterval);
      repeatTimer = repeatInterval = null;
    }

    // ── EVENT LISTENERS (Liste) ───────────────────────────────────────────────

    document.getElementById('items-list').addEventListener('click', e => {
      const item = e.target.closest('.item');
      if (!item) return;
      const name = item.dataset.name;
      if (e.target.closest('.remove-btn')) { deleteItem(name, item); return; }
      if (e.target.closest('.bring-btn')) { addToBring(name, e.target.closest('.bring-btn')); return; }
      openDetail(name);
    });

    document.getElementById('search').addEventListener('input', e => {
      applyFilter(e.target.value);
    });

    document.getElementById('undo-btn').addEventListener('click', handleUndo);

    window.addEventListener('resize', updateStickyOffset);

    // Batch-delete zeroed items when app closes
    window.addEventListener('pagehide', () => {
      codeReader?.reset();
      if (!zeroedItems.size) return;
      fetch('/api/fridge/delete-batch', {
        method: 'POST',
        headers,
        body: JSON.stringify({ names: [...zeroedItems] }),
        keepalive: true,
      }).catch(() => {});
    });

    // ── INIT ──────────────────────────────────────────────────────────────────

    async function loadItems() {
      renderSkeleton();
      try {
        const res   = await fetch('/api/fridge', { headers });
        if (!res.ok) {
          const debug = `platform=${tg.platform} version=${tg.version} initDataLen=${initData.length}`;
          document.getElementById('items-list').innerHTML =
            `<div class="empty-state"><div class="icon">⚠️</div><p>Nicht autorisiert (HTTP ${res.status})</p><p style="font-size:11px;opacity:.6;margin-top:8px;">${debug}</p></div>`;
          return;
        }
        const items = await res.json();
        renderItems(items);
      } catch {
        document.getElementById('items-list').innerHTML =
          '<div class="empty-state"><div class="icon">⚠️</div><p>Fehler beim Laden</p></div>';
      }
    }

    loadItems();

    // ── SHEET DRAG-TO-CLOSE ───────────────────────────────────────────────────
    // Nach unten wischen schließt das Sheet; preventDefault verhindert, dass
    // die Geste stattdessen die Liste im Hintergrund scrollt. Startet die
    // Geste auf einem Bedienelement (Input, Chip, Slider, Button), wird sie
    // ignoriert, damit dessen eigene Touch-Bedienung unangetastet bleibt.

    const SHEET_DRAG_IGNORE = 'input, .chip, .btn, .detail-slider';

    function attachSheetSwipeDown(sheetEl, closeFn) {
      let startY = 0, dy = 0, tracking = false, dragging = false;

      sheetEl.addEventListener('touchstart', e => {
        tracking = !e.target.closest(SHEET_DRAG_IGNORE);
        if (!tracking) return;
        startY = e.touches[0].clientY;
        dy = 0;
        dragging = false;
      }, { passive: true });

      sheetEl.addEventListener('touchmove', e => {
        if (!tracking) return;
        const moveY = e.touches[0].clientY - startY;
        if (!dragging) {
          if (moveY < 4) return;
          dragging = true;
          sheetEl.style.transition = 'none';
        }
        dy = Math.max(0, moveY);
        sheetEl.style.transform = `translateY(${dy}px)`;
        e.preventDefault();
      }, { passive: false });

      sheetEl.addEventListener('touchend', () => {
        if (!tracking) return;
        tracking = false;
        if (!dragging) return;
        dragging = false;
        sheetEl.style.transition = '';
        sheetEl.style.transform = '';
        if (dy > 60) closeFn();
      }, { passive: true });
    }

    // ── DETAIL-SHEET (MHD, Füllstand, Kategorie) ─────────────────────────────

    const detailOverlay   = document.getElementById('detail-overlay');
    const detailSheet     = document.getElementById('detail-sheet');
    const detailName      = document.getElementById('detail-name');
    const detailExpiry    = document.getElementById('detail-expiry');
    const detailSlider    = document.getElementById('detail-slider');
    const detailSliderPct = document.getElementById('detail-slider-pct');
    const detailSliderAbs = document.getElementById('detail-slider-abs');
    const detailStepperDisplay = document.getElementById('detail-stepper-display');
    const detailAmountField    = document.getElementById('detail-amount-field');
    const detailSliderBlock    = document.getElementById('detail-slider-block');
    const detailStepperBlock   = document.getElementById('detail-stepper-block');

    function patchItem(name, patch) {
      return fetch(`/api/fridge/${encodeURIComponent(name)}`, {
        method: 'PATCH', headers, body: JSON.stringify(patch),
      });
    }

    function applySliderStyle(pct) {
      const hue = Math.round(Math.max(0, Math.min(100, pct)) * 1.2);
      detailSlider.style.setProperty('--fill-pct', pct + '%');
      detailSlider.style.setProperty('--fill-color', `hsl(${hue}, 70%, 45%)`);
    }

    function updateSliderUI() {
      const zeroed = zeroedItems.has(currentItem.name);
      const pct = zeroed ? 0 : Math.round((currentItem.quantity / currentItem.fullQuantity) * 100);
      const abs = zeroed ? 0 : currentItem.quantity;
      detailSlider.value = pct;
      applySliderStyle(pct);
      detailSliderPct.textContent = `${pct}%`;
      detailSliderAbs.textContent = `≈ ${abs} ${currentItem.unit} von ${currentItem.fullQuantity} ${currentItem.unit}`;
    }

    function updateStepperUI() {
      const zeroed = zeroedItems.has(currentItem.name);
      const qty = zeroed ? 0 : currentItem.quantity;
      const unit = currentItem.unit ?? '';
      detailStepperDisplay.textContent = `${qty}${unit ? ' ' + unit : ''}`;
    }

    function renderDetail() {
      detailName.textContent = currentItem.name;

      document.querySelectorAll('#detail-category-chips .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.category === currentItem.category);
      });

      detailExpiry.value = currentItem.expiryDate ?? '';

      if (currentItem.quantity == null) {
        detailAmountField.style.display = 'none';
        return;
      }
      detailAmountField.style.display = '';
      const measurable = isMeasurableUnit(currentItem.unit) && currentItem.fullQuantity;
      detailSliderBlock.style.display  = measurable ? '' : 'none';
      detailStepperBlock.style.display = measurable ? 'none' : '';
      if (measurable) updateSliderUI(); else updateStepperUI();
    }

    function openDetail(name) {
      const item = allItems.find(i => i.name === name);
      if (!item) return;
      currentItem = item;
      renderDetail();
      detailOverlay.classList.add('visible');
      detailSheet.classList.add('open');
    }

    function closeDetail() {
      detailSheet.classList.remove('open');
      detailOverlay.classList.remove('visible');
      currentItem = null;
    }

    detailOverlay.addEventListener('click', closeDetail);
    attachSheetSwipeDown(detailSheet, closeDetail);

    // Kategorie ändern
    document.querySelectorAll('#detail-category-chips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        if (!currentItem) return;
        currentItem.category = chip.dataset.category;
        document.querySelectorAll('#detail-category-chips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        applyFilter(document.getElementById('search').value);
        tg.HapticFeedback?.notificationOccurred('success');
        patchItem(currentItem.name, { category: currentItem.category });
      });
    });

    // MHD
    function commitExpiry(value) {
      currentItem.expiryDate = value;
      detailExpiry.value = value ?? '';
      applyFilter(document.getElementById('search').value);
      tg.HapticFeedback?.notificationOccurred('success');
      patchItem(currentItem.name, { expiryDate: value });
    }

    detailExpiry.addEventListener('change', () => {
      if (!currentItem) return;
      commitExpiry(detailExpiry.value || null);
    });

    document.querySelectorAll('#detail-expiry-chips .chip[data-days]').forEach(chip => {
      chip.addEventListener('click', () => {
        if (!currentItem) return;
        const d = new Date();
        d.setDate(d.getDate() + parseInt(chip.dataset.days, 10));
        commitExpiry(d.toISOString().slice(0, 10));
      });
    });

    document.getElementById('detail-expiry-clear').addEventListener('click', () => {
      if (!currentItem) return;
      commitExpiry(null);
    });

    // Füllstand-Slider
    detailSlider.addEventListener('input', () => {
      const pct = parseInt(detailSlider.value, 10);
      applySliderStyle(pct);
      const abs = Math.round(currentItem.fullQuantity * pct / 100 * 100) / 100;
      detailSliderPct.textContent = `${pct}%`;
      detailSliderAbs.textContent = `≈ ${abs} ${currentItem.unit} von ${currentItem.fullQuantity} ${currentItem.unit}`;
    });

    detailSlider.addEventListener('change', () => {
      if (!currentItem) return;
      const pct = parseInt(detailSlider.value, 10);
      if (pct <= 0) {
        zeroedItems.add(currentItem.name);
        updateSliderUI();
        tg.HapticFeedback?.notificationOccurred('warning');
        applyFilter(document.getElementById('search').value);
        return;
      }
      zeroedItems.delete(currentItem.name);
      const qty = Math.round(currentItem.fullQuantity * pct / 100 * 100) / 100;
      currentItem.quantity = qty;
      updateSliderUI();
      tg.HapticFeedback?.notificationOccurred('success');
      enableUndo();
      applyFilter(document.getElementById('search').value);
      patchItem(currentItem.name, { quantity: qty });
    });

    // Stepper (zählbare Artikel)
    function detailAdjustQty(delta) {
      const zeroed = zeroedItems.has(currentItem.name);
      if (zeroed) {
        if (delta < 0) return;
        zeroedItems.delete(currentItem.name);
        currentItem.quantity = 1;
        updateStepperUI();
        tg.HapticFeedback?.notificationOccurred('success');
        enableUndo();
        applyFilter(document.getElementById('search').value);
        return;
      }
      const newQty = parseFloat(((currentItem.quantity ?? 0) + delta).toFixed(3));
      if (newQty <= 0) {
        zeroedItems.add(currentItem.name);
        updateStepperUI();
        tg.HapticFeedback?.notificationOccurred('warning');
        applyFilter(document.getElementById('search').value);
        return;
      }
      currentItem.quantity = newQty;
      updateStepperUI();
      tg.HapticFeedback?.notificationOccurred('success');
      enableUndo();
      applyFilter(document.getElementById('search').value);
      patchItem(currentItem.name, { delta });
    }

    document.getElementById('detail-minus-btn').addEventListener('pointerdown', e => {
      const btn = e.currentTarget;
      btn.classList.add('pressing');
      btn.setPointerCapture(e.pointerId);
      startRepeat(() => detailAdjustQty(-1));
      const stop = () => { stopRepeat(); btn.classList.remove('pressing'); };
      btn.addEventListener('pointerup', stop, { once: true });
      btn.addEventListener('pointercancel', stop, { once: true });
    });

    document.getElementById('detail-plus-btn').addEventListener('pointerdown', e => {
      const btn = e.currentTarget;
      btn.classList.add('pressing');
      btn.setPointerCapture(e.pointerId);
      startRepeat(() => detailAdjustQty(1));
      const stop = () => { stopRepeat(); btn.classList.remove('pressing'); };
      btn.addEventListener('pointerup', stop, { once: true });
      btn.addEventListener('pointercancel', stop, { once: true });
    });

    // Löschen
    document.getElementById('detail-delete-btn').addEventListener('click', async () => {
      if (!currentItem) return;
      const name = currentItem.name;
      closeDetail();
      await fetch(`/api/fridge/${encodeURIComponent(name)}`, { method: 'DELETE', headers });
      allItems = allItems.filter(i => i.name !== name);
      zeroedItems.delete(name);
      applyFilter(document.getElementById('search').value);
      tg.HapticFeedback?.notificationOccurred('success');
      enableUndo();
    });

    // ── ADD-SHEET ─────────────────────────────────────────────────────────────

    const fab      = document.getElementById('fab');
    const sheet    = document.getElementById('sheet');
    const overlay  = document.getElementById('sheet-overlay');
    const inpName  = document.getElementById('inp-name');
    const inpQty   = document.getElementById('inp-qty');
    const inpUnit  = document.getElementById('inp-unit');
    const addBtn   = document.getElementById('add-btn');

    let selectedCategory = 'kuehlschrank';
    let categoryManuallySet = false;

    function setAddCategoryChips(category) {
      document.querySelectorAll('#add-category-chips .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.category === category);
      });
    }

    function openSheet() {
      overlay.classList.add('visible');
      sheet.classList.add('open');
      fab.classList.add('open');
      setTimeout(() => inpName.focus(), 320);
    }

    function closeSheet() {
      sheet.classList.remove('open');
      overlay.classList.remove('visible');
      fab.classList.remove('open');
      inpName.value = '';
      inpQty.value  = '';
      inpUnit.value = '';
      document.querySelectorAll('#add-unit-chips .chip').forEach(c => c.classList.remove('active'));
      selectedCategory = 'kuehlschrank';
      categoryManuallySet = false;
      setAddCategoryChips(selectedCategory);
      addBtn.disabled = true;
    }

    fab.addEventListener('click', () => {
      sheet.classList.contains('open') ? closeSheet() : openSheet();
    });
    overlay.addEventListener('click', closeSheet);

    inpName.addEventListener('input', () => {
      addBtn.disabled = !inpName.value.trim();
      if (!categoryManuallySet && inpName.value.trim()) {
        selectedCategory = guessCategory(inpName.value);
        setAddCategoryChips(selectedCategory);
      }
    });

    document.querySelectorAll('#add-unit-chips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#add-unit-chips .chip').forEach(c => c.classList.remove('active'));
        if (inpUnit.value === chip.dataset.unit) {
          inpUnit.value = '';
        } else {
          chip.classList.add('active');
          inpUnit.value = chip.dataset.unit;
        }
      });
    });

    document.querySelectorAll('#add-category-chips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        selectedCategory = chip.dataset.category;
        categoryManuallySet = true;
        setAddCategoryChips(selectedCategory);
      });
    });

    inpUnit.addEventListener('input', () => {
      document.querySelectorAll('#add-unit-chips .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.unit === inpUnit.value);
      });
    });

    addBtn.addEventListener('click', async () => {
      const name = inpName.value.trim();
      if (!name) return;
      const qty  = inpQty.value !== '' ? parseFloat(inpQty.value) : null;
      const unit = inpUnit.value.trim() || null;

      addBtn.disabled = true;
      try {
        const res   = await fetch('/api/fridge/add', {
          method: 'POST', headers,
          body: JSON.stringify({ name, quantity: qty, unit, category: selectedCategory }),
        });
        const { items } = await res.json();
        renderItems(items);
        tg.HapticFeedback?.notificationOccurred('success');
        closeSheet();
      } catch {
        addBtn.disabled = false;
        tg.HapticFeedback?.notificationOccurred('error');
      }
    });

    // Swipe sheet down to close
    attachSheetSwipeDown(sheet, closeSheet);

    // ── BARCODE-SCANNER ───────────────────────────────────────────────────────

    const scanOverlay  = document.getElementById('scan-overlay');
    const scanHint     = document.getElementById('scan-hint');
    let codeReader = null;
    let scanning   = false;

    async function openScanner() {
      scanOverlay.classList.add('visible');
      scanHint.textContent = 'Barcode ins Bild halten…';
      scanning = true;
      codeReader = new ZXing.BrowserMultiFormatReader();
      try {
        await codeReader.decodeFromConstraints(
          { video: { facingMode: 'environment' } },
          'scan-video',
          (result) => {
            if (result && scanning) {
              scanning = false;
              tg.HapticFeedback?.notificationOccurred('success');
              handleScanResult(result.getText());
            }
          }
        );
      } catch (e) {
        console.error('[scan] Kamera-Fehler:', e.message);
        closeScanner();
        tg.showAlert?.('Kamera konnte nicht gestartet werden.');
      }
    }

    function closeScanner() {
      scanning = false;
      codeReader?.reset();
      scanOverlay.classList.remove('visible');
    }

    async function handleScanResult(code) {
      closeScanner();
      try {
        const res  = await fetch('/api/fridge/barcode', {
          method: 'POST', headers, body: JSON.stringify({ code }),
        });
        const data = await res.json();
        openSheet();
        if (data.found && data.product) {
          inpName.value = data.product.name;
          inpQty.value  = data.product.quantity ?? '';
          inpUnit.value = data.product.unit ?? '';
          addBtn.disabled = !inpName.value.trim();
          document.querySelectorAll('#add-unit-chips .chip').forEach(c => {
            c.classList.toggle('active', c.dataset.unit === inpUnit.value);
          });
          selectedCategory = guessCategory(inpName.value);
          categoryManuallySet = false;
          setAddCategoryChips(selectedCategory);
        } else {
          tg.HapticFeedback?.notificationOccurred('warning');
        }
      } catch {
        openSheet();
        tg.HapticFeedback?.notificationOccurred('error');
      }
    }

    document.getElementById('scan-btn').addEventListener('click', openScanner);
    document.getElementById('scan-close-btn').addEventListener('click', closeScanner);
  </script>
</body>
</html>
