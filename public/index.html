<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Kühlschrank</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-app: oklch(0.17 0.02 55);
      --bg-header: oklch(0.12 0.015 55);
      --bg-card: oklch(0.23 0.02 55);
      --bg-pill: oklch(0.28 0.02 55);
      --accent-bg: oklch(0.72 0.15 45);
      --accent-fg: oklch(0.15 0.01 45);
      --avatar-bg: oklch(0.4 0.1 45);
      --text-primary: oklch(0.96 0.01 60);
      --text-dim: oklch(0.6 0.02 60);
      --text-mid: oklch(0.82 0.01 60);
      --text-soft: oklch(0.85 0.01 60);
      --handle: oklch(0.35 0.02 55);

      --red-bg: oklch(0.3 0.09 25);
      --red-fg: oklch(0.8 0.16 25);
      --red-dot: oklch(0.65 0.2 25);
      --green-bg: oklch(0.3 0.1 150);
      --green-fg: oklch(0.85 0.15 150);
      --green-dot: oklch(0.72 0.16 145);
      --yellow-bg: oklch(0.3 0.08 75);
      --yellow-fg: oklch(0.82 0.15 78);
      --yellow-dot: oklch(0.8 0.16 90);

      --bring-off-bg: oklch(0.27 0.06 45);
      --bring-off-fg: oklch(0.8 0.13 45);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-app);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
    }

    /* ── Topbar ──────────────────────────────────────────────────────────────── */

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-header);
      flex-shrink: 0;
    }

    #close-btn {
      border: none;
      background: none;
      color: var(--text-dim);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--avatar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-primary);
      flex-shrink: 0;
    }

    .app-name {
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
    }

    .topbar-spacer { flex: 1; }

    .menu-wrap { position: relative; }

    #menu-btn {
      border: none;
      background: none;
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 4px 6px;
      -webkit-tap-highlight-color: transparent;
    }

    .menu-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: var(--bg-card);
      border-radius: 12px;
      padding: 4px;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 30;
    }
    .menu-dropdown.open { display: block; }

    .menu-item {
      display: block;
      width: 100%;
      text-align: left;
      border: none;
      background: none;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-item:disabled { color: var(--text-dim); opacity: 0.5; cursor: default; }
    .menu-item:not(:disabled):active { background: var(--bg-pill); }

    /* ── Titelzeile ──────────────────────────────────────────────────────────── */

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      flex-shrink: 0;
    }

    .page-title {
      font-size: 19px;
      font-weight: 800;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .round-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .round-btn:active { transform: scale(0.88); }
    .round-btn.neutral { background: var(--bg-card); color: var(--text-mid); font-size: 15px; }
    .round-btn.neutral img { display: block; filter: invert(1) brightness(1.4); }
    .round-btn.accent { background: var(--accent-bg); color: var(--accent-fg); font-size: 18px; font-weight: 700; }

    /* ── Suche ───────────────────────────────────────────────────────────────── */

    #search-wrap { padding: 0 16px 12px; flex-shrink: 0; }

    #search {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
    }
    #search::placeholder { color: var(--text-dim); }

    /* ── Filter-Chips ────────────────────────────────────────────────────────── */

    .filter-chips {
      display: flex;
      gap: 6px;
      padding: 0 16px 12px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .filter-chips::-webkit-scrollbar { display: none; }

    .filter-chip {
      padding: 7px 13px;
      border-radius: 20px;
      border: none;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      background: var(--bg-card);
      color: var(--text-mid);
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .filter-chip.active {
      background: var(--accent-bg);
      color: var(--accent-fg);
    }

    /* ── Karten-Grid ─────────────────────────────────────────────────────────── */

    #items-grid {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-content: start;
    }

    .card {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 9px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 7px;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .card.zeroed { opacity: 0.55; }
    .card.zeroed .card-name { text-decoration: line-through; }

    .card-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      padding-right: 14px;
    }

    .card-icon { font-size: 18px; flex-shrink: 0; line-height: 1; }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .card-pill {
      font-size: 10.5px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--bg-pill);
      color: var(--text-soft);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .card-bring {
      width: 25px;
      height: 25px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      flex-shrink: 0;
      background: var(--bring-off-bg);
      color: var(--bring-off-fg);
      -webkit-tap-highlight-color: transparent;
    }
    .card-bring.done { background: var(--green-bg); color: var(--green-fg); }

    @keyframes bringPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .card-bring.pulse { animation: bringPulse 0.55s ease-in-out 3; }

    /* ── Empty ───────────────────────────────────────────────────────────────── */

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: var(--text-dim);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── Skeleton ────────────────────────────────────────────────────────────── */

    .skeleton-card {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 9px 10px;
      height: 62px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .skel {
      background: var(--bg-pill);
      background: linear-gradient(90deg, var(--bg-pill) 25%, oklch(0.3 0.02 55) 50%, var(--bg-pill) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-line { height: 12px; width: 70%; }
    .skel-pill { height: 16px; width: 40%; border-radius: 20px; }

    /* ── Barcode-Scanner ─────────────────────────────────────────────────────── */

    #scan-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 50;
    }
    #scan-overlay.visible { display: block; }

    #scan-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scan-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 78%;
      max-width: 320px;
      aspect-ratio: 16 / 9;
      border: 3px solid #fff;
      border-radius: 14px;
      box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.45);
      pointer-events: none;
    }

    #scan-close-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #scan-hint {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 13px;
      opacity: 0.8;
    }

    /* ── Bottom Sheets (Add & Detail) ────────────────────────────────────────── */

    .sheet-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 40;
    }
    .sheet-backdrop.visible { display: block; }

    .bottom-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg-app);
      border-radius: 20px 20px 0 0;
      padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 24px);
      z-index: 41;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 80%;
      overflow-y: auto;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--handle);
      margin: 10px auto 16px;
    }

    .sheet-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }
    .detail-header .sheet-title {
      margin-bottom: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-delete-btn {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: none;
      background: var(--red-bg);
      color: var(--red-fg);
      font-size: 15px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .sheet-field { margin-bottom: 16px; }

    .sheet-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .sheet-field input[type="text"],
    .sheet-field input[type="number"],
    .sheet-field input[type="date"] {
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 12px;
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
      color-scheme: dark;
    }

    .qty-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .chip-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .chip {
      padding: 7px 13px;
      border-radius: 20px;
      border: none;
      background: var(--bg-card);
      color: var(--text-mid);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .chip.active { background: var(--accent-bg); color: var(--accent-fg); }
    .chip.small { padding: 6px 12px; font-size: 12px; font-weight: 600; color: var(--text-soft); }

    #add-btn {
      width: 100%;
      margin-top: 4px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: var(--accent-bg);
      color: var(--accent-fg);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    #add-btn:disabled { opacity: 0.45; }
    #add-btn:not(:disabled):active { opacity: 0.8; }

    /* ── Menge: Stepper + Slider ─────────────────────────────────────────────── */

    .qty-stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 2px 0 8px;
    }

    .qty-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .qty-btn.pressing { filter: brightness(0.85); }
    .minus-btn { background: var(--red-bg); color: var(--red-fg); }
    .plus-btn { background: var(--green-bg); color: var(--green-fg); }

    .qty-display {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      min-width: 64px;
      text-align: center;
      flex-shrink: 0;
    }

    .detail-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 20px;
      background: transparent;
      accent-color: var(--accent-bg);
      cursor: pointer;
      margin: 2px 0 4px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button id="close-btn" title="Schließen">✕</button>
    <div class="avatar">D</div>
    <span class="app-name">Dayo</span>
    <span class="topbar-spacer"></span>
    <div class="menu-wrap">
      <button id="menu-btn" title="Mehr">•••</button>
      <div id="menu-dropdown" class="menu-dropdown">
        <button id="undo-btn" class="menu-item" disabled>↩ Rückgängig</button>
      </div>
    </div>
  </div>

  <div class="title-row">
    <span class="page-title">🧊 Kühlschrank</span>
    <div class="title-actions">
      <button id="scan-btn" class="round-btn neutral" title="Barcode scannen"><img src="Emojis/E1D9.svg" alt="Barcode scannen" width="16" height="16"></button>
      <button id="fab" class="round-btn accent" title="Hinzufügen">+</button>
    </div>
  </div>

  <div id="search-wrap">
    <input id="search" type="search" placeholder="🔍 Suchen…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div id="filter-chips" class="filter-chips"></div>

  <div id="items-grid"></div>

  <!-- Add-Sheet -->
  <div id="sheet-overlay" class="sheet-backdrop"></div>
  <div id="sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Artikel hinzufügen</div>

    <div class="sheet-field">
      <label class="sheet-label">Name</label>
      <input id="inp-name" type="text" placeholder="z.B. Original Stracke Salami" autocomplete="off">
    </div>

    <div class="qty-row sheet-field">
      <div>
        <label class="sheet-label">Menge</label>
        <input id="inp-qty" type="number" placeholder="z.B. 3" min="0" step="any">
      </div>
      <div>
        <label class="sheet-label">Einheit</label>
        <div class="chip-row" id="add-unit-chips" style="margin-top: 0;">
          <button class="chip" data-unit="Stk">Stk</button>
          <button class="chip" data-unit="g">g</button>
          <button class="chip" data-unit="kg">kg</button>
          <button class="chip" data-unit="ml">ml</button>
          <button class="chip" data-unit="l">l</button>
          <button class="chip" data-unit="Pkg">Pkg</button>
        </div>
      </div>
    </div>

    <div class="sheet-field">
      <label class="sheet-label">Kategorie</label>
      <div class="chip-row" id="add-category-chips" style="margin-top: 0;">
        <button class="chip" data-category="kuehlschrank">🧊 Kühlschrank</button>
        <button class="chip" data-category="tiefkuehlfach">❄️ Tiefkühlfach</button>
        <button class="chip" data-category="speisekammer">🥫 Speisekammer</button>
      </div>
    </div>

    <button id="add-btn" disabled>Hinzufügen</button>
  </div>

  <!-- Detail-Sheet -->
  <div id="detail-overlay" class="sheet-backdrop"></div>
  <div id="detail-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="detail-header">
      <div class="sheet-title" id="detail-name"></div>
      <button id="detail-delete-btn" class="detail-delete-btn" title="Artikel löschen">🗑️</button>
    </div>

    <div class="sheet-field">
      <label class="sheet-label">Kategorie</label>
      <div class="chip-row" id="detail-category-chips" style="margin-top: 0;">
        <button class="chip" data-category="kuehlschrank">🧊 Kühlschrank</button>
        <button class="chip" data-category="tiefkuehlfach">❄️ Tiefkühlfach</button>
        <button class="chip" data-category="speisekammer">🥫 Speisekammer</button>
      </div>
    </div>

    <div class="sheet-field">
      <label class="sheet-label">Mindesthaltbarkeit</label>
      <input id="detail-expiry" type="date">
      <div class="chip-row" id="detail-expiry-chips">
        <button class="chip small" data-days="3">+3 Tage</button>
        <button class="chip small" data-days="7">+1 Woche</button>
        <button class="chip small" data-days="14">+2 Wochen</button>
        <button class="chip small" data-days="30">+1 Monat</button>
        <button class="chip small" id="detail-expiry-clear">Entfernen</button>
      </div>
    </div>

    <div class="sheet-field" id="detail-amount-field">
      <label class="sheet-label">Menge</label>
      <div class="qty-stepper">
        <button class="qty-btn minus-btn" id="detail-minus-btn">−</button>
        <span class="qty-display" id="detail-qty-display"></span>
        <button class="qty-btn plus-btn" id="detail-plus-btn">+</button>
      </div>
      <input id="detail-slider" class="detail-slider" type="range" min="0" max="100" step="1">
    </div>
  </div>

  <div id="scan-overlay">
    <video id="scan-video" autoplay muted playsinline></video>
    <div class="scan-frame"></div>
    <button id="scan-close-btn" title="Schließen">✕</button>
    <div id="scan-hint">Barcode ins Bild halten…</div>
  </div>

  <script src="https://unpkg.com/@zxing/library@0.21.3"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const initData = tg.initData || '';
    const headers = { 'Authorization': initData, 'Content-Type': 'application/json' };

    // Items zeroed in this session – deleted on pagehide
    const zeroedItems = new Set();
    // Artikel, die in dieser Session auf die Bring!-Liste gesetzt wurden
    const bringDone = new Set();
    let allItems = [];
    let currentItem = null; // aktuell im Detail-Sheet geöffneter Artikel
    const activeFilters = new Set(); // aktive Kategorie-Filter-Chips (leer = alle)

    // ── KATEGORIEN ────────────────────────────────────────────────────────────

    const CATEGORY_ORDER = ['kuehlschrank', 'tiefkuehlfach', 'speisekammer'];
    const CATEGORY_META = {
      kuehlschrank:  { label: 'Kühlschrank',  icon: '🧊' },
      tiefkuehlfach: { label: 'Tiefkühlfach', icon: '❄️' },
      speisekammer:  { label: 'Speisekammer', icon: '🥫' },
    };
    const MEASURABLE_UNITS = ['g', 'kg', 'ml', 'l'];

    function isMeasurableUnit(unit) {
      return !!unit && MEASURABLE_UNITS.includes(unit.toLowerCase());
    }

    function isPercentItem(item) {
      return item.quantity != null && isMeasurableUnit(item.unit) && item.fullQuantity != null;
    }

    function guessCategory(name) {
      const n = name.toLowerCase();

      if (/tiefgekühlt|tiefkühl|\btk[\s-]|pommes|fischstäbchen|eiscreme|\beis\b|garnele|shrimp/.test(n)) return 'tiefkuehlfach';

      if (/milch|milk|käse|cheese|butter|joghurt|yogurt|sahne|creme fraiche|schmand|quark|\bei\b|eier|salami|wurst|schinken|fleisch|hack|schnitzel|hähnchen|hühnchen|fisch|lachs|thunfisch|forelle|hering|karotte|möhre|tomate|paprika|gurke|salat|rucola|spinat|brokkoli|champignon|pilz|apfel|banane|orange|mandarine|zitrone|erdbeere|traube|heidelbeere|blaubeere|avocado|mayo|mayonnaise/.test(n)) return 'kuehlschrank';

      if (/zwiebel|knoblauch|kartoffel|mais|honig|marmelade|konfitüre|senf|ketchup|saft|juice|wasser|bier|wein|brot|brötchen|toast|öl\b|oil|schokolade|schoko|pizza|nudel|pasta|reis|mehl|zucker|salz|gewürz|konserve|dose|linsen|müsli|hafer|kaffee|\btee\b/.test(n)) return 'speisekammer';

      return 'kuehlschrank';
    }

    // Produktspezifisches Emoji, sonst Kategorie-Icon als Fallback
    const ICON_RULES = [
      [/tomate/, '🍅'], [/wassermelone/, '🍉'], [/banane/, '🍌'], [/gurke/, '🥒'],
      [/fischstäbchen|fisch|lachs|thunfisch|forelle|hering/, '🐟'], [/erbsen/, '🫛'],
      [/reis/, '🍚'], [/linsen/, '🫘'], [/hähnchen|hühnchen|brustfilet/, '🍗'],
      [/hack|schnitzel/, '🥩'], [/ingwer/, '🫚'], [/tofu/, '🥡'],
      [/milch|milk/, '🥛'], [/käse|cheese/, '🧀'], [/butter/, '🧈'],
      [/joghurt|yogurt|quark/, '🥣'], [/\bei\b|eier/, '🥚'],
      [/salami|wurst|schinken/, '🥓'], [/karotte|möhre/, '🥕'], [/paprika/, '🫑'],
      [/salat|rucola|spinat/, '🥬'], [/brokkoli/, '🥦'], [/champignon|pilz/, '🍄'],
      [/apfel/, '🍎'], [/orange|mandarine/, '🍊'], [/zitrone/, '🍋'],
      [/erdbeere/, '🍓'], [/traube/, '🍇'], [/heidelbeere|blaubeere/, '🫐'],
      [/avocado/, '🥑'], [/zwiebel/, '🧅'], [/knoblauch/, '🧄'], [/kartoffel/, '🥔'],
      [/mais/, '🌽'], [/honig/, '🍯'], [/saft|juice/, '🧃'], [/bier/, '🍺'],
      [/wein/, '🍷'], [/brot|brötchen|toast/, '🍞'], [/schokolade|schoko/, '🍫'],
      [/pizza/, '🍕'], [/nudel|pasta/, '🍝'], [/kaffee/, '☕'], [/\btee\b/, '🍵'],
    ];

    function iconFor(name, category) {
      const n = name.toLowerCase();
      for (const [re, icon] of ICON_RULES) if (re.test(n)) return icon;
      return (CATEGORY_META[category] && CATEGORY_META[category].icon) || '🧊';
    }

    // ── SKELETON ──────────────────────────────────────────────────────────────

    function renderSkeleton() {
      document.getElementById('items-grid').innerHTML = Array(6).fill('').map(() => `
        <div class="skeleton-card">
          <div class="skel skel-line"></div>
          <div class="skel skel-pill"></div>
        </div>`).join('');
    }

    // ── RENDER ────────────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function pillFor(item) {
      if (item.quantity == null) return '';
      const qty = item.quantity;
      const unit = item.unit ?? '';
      if (isPercentItem(item)) {
        return Math.round((qty / item.fullQuantity) * 100) + '%';
      }
      if (unit === 'Stk') return `${qty} Stück`;
      if (unit) return `${qty} ${unit}`;
      return String(qty);
    }

    function daysUntil(expiryDate) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const exp = new Date(expiryDate + 'T00:00:00');
      return Math.round((exp - today) / 86400000);
    }

    function dotFor(expiryDate) {
      if (!expiryDate) return null;
      const diff = daysUntil(expiryDate);
      if (diff <= 1) return 'var(--red-dot)';
      if (diff <= 5) return 'var(--yellow-dot)';
      return 'var(--green-dot)';
    }

    function renderCard(item) {
      const zeroed = zeroedItems.has(item.name);
      const done = bringDone.has(item.name);
      const dot = dotFor(item.expiryDate);
      const pillText = zeroed ? pillFor({ ...item, quantity: 0 }) : pillFor(item);

      return `
        <div class="card${zeroed ? ' zeroed' : ''}" data-name="${escHtml(item.name)}">
          ${dot ? `<span class="card-dot" style="background:${dot};"></span>` : ''}
          <div class="card-head">
            <span class="card-icon">${iconFor(item.name, item.category)}</span>
            <span class="card-name">${escHtml(item.name)}</span>
          </div>
          <div class="card-foot">
            <span class="card-pill">${pillText}</span>
            <button class="card-bring${done ? ' done' : ''}${zeroed ? ' pulse' : ''}" data-action="bring">${done ? '✓' : '🛒'}</button>
          </div>
        </div>`;
    }

    function renderChips() {
      document.getElementById('filter-chips').innerHTML = CATEGORY_ORDER.map(cat => {
        const meta = CATEGORY_META[cat];
        const active = activeFilters.has(cat);
        return `<button class="filter-chip${active ? ' active' : ''}" data-category="${cat}">${meta.icon} ${meta.label}</button>`;
      }).join('');
    }

    function renderItems(items) {
      allItems = items;
      applyFilter(document.getElementById('search').value);
    }

    function applyFilter(query = '') {
      const q = query.toLowerCase().trim();
      const container = document.getElementById('items-grid');

      if (!allItems.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🫙</div><p>Kühlschrank ist leer</p></div>';
        return;
      }

      const filtered = allItems.filter(i => {
        const matchesFilter = !activeFilters.size || activeFilters.has(i.category || 'kuehlschrank');
        const matchesQuery = !q || i.name.toLowerCase().includes(q);
        return matchesFilter && matchesQuery;
      });

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>Nichts gefunden</p></div>';
        return;
      }

      container.innerHTML = filtered.map(renderCard).join('');
    }

    // ── ACTIONS ───────────────────────────────────────────────────────────────

    function enableUndo() {
      document.getElementById('undo-btn').disabled = false;
    }

    async function handleUndo() {
      const btn = document.getElementById('undo-btn');
      btn.disabled = true;
      closeMenu();
      const res = await fetch('/api/fridge/undo', { method: 'POST', headers });
      const { success, items } = await res.json();
      if (success) {
        zeroedItems.clear();
        renderItems(items);
        tg.HapticFeedback?.notificationOccurred('success');
      } else {
        tg.HapticFeedback?.notificationOccurred('error');
      }
    }

    function patchItem(name, patch) {
      return fetch(`/api/fridge/${encodeURIComponent(name)}`, {
        method: 'PATCH', headers, body: JSON.stringify(patch),
      });
    }

    async function deleteItem(name) {
      allItems = allItems.filter(i => i.name !== name);
      zeroedItems.delete(name);
      bringDone.delete(name);
      applyFilter(document.getElementById('search').value);
      await fetch(`/api/fridge/${encodeURIComponent(name)}`, { method: 'DELETE', headers });
      tg.HapticFeedback?.notificationOccurred('success');
      enableUndo();
    }

    async function toggleBring(name, btn) {
      const nowDone = !bringDone.has(name);
      nowDone ? bringDone.add(name) : bringDone.delete(name);
      btn.classList.toggle('done', nowDone);
      btn.classList.remove('pulse');
      btn.textContent = nowDone ? '✓' : '🛒';
      tg.HapticFeedback?.notificationOccurred('success');
      if (nowDone) {
        try {
          await fetch('/api/fridge/bring', { method: 'POST', headers, body: JSON.stringify({ name }) });
        } catch {
          tg.HapticFeedback?.notificationOccurred('error');
        }
      }
    }

    // ── AUTO-REPEAT (für Stepper im Detail-Sheet) ────────────────────────────

    let repeatTimer = null, repeatInterval = null;

    function startRepeat(fn) {
      fn();
      repeatTimer = setTimeout(() => { repeatInterval = setInterval(fn, 140); }, 500);
    }

    function stopRepeat() {
      clearTimeout(repeatTimer);
      clearInterval(repeatInterval);
      repeatTimer = repeatInterval = null;
    }

    // ── EVENT LISTENERS (Grid) ────────────────────────────────────────────────

    document.getElementById('items-grid').addEventListener('click', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      const name = card.dataset.name;
      const bringBtn = e.target.closest('.card-bring');
      if (bringBtn) { e.stopPropagation(); toggleBring(name, bringBtn); return; }
      openDetail(name);
    });

    document.getElementById('search').addEventListener('input', e => {
      applyFilter(e.target.value);
    });

    document.getElementById('filter-chips').addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      const cat = chip.dataset.category;
      activeFilters.has(cat) ? activeFilters.delete(cat) : activeFilters.add(cat);
      renderChips();
      applyFilter(document.getElementById('search').value);
    });

    // ── HEADER: Schließen & Overflow-Menü ─────────────────────────────────────

    const menuDropdown = document.getElementById('menu-dropdown');

    function closeMenu() { menuDropdown.classList.remove('open'); }

    document.getElementById('close-btn').addEventListener('click', () => tg.close());

    document.getElementById('menu-btn').addEventListener('click', e => {
      e.stopPropagation();
      menuDropdown.classList.toggle('open');
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.menu-wrap')) closeMenu();
    });

    document.getElementById('undo-btn').addEventListener('click', handleUndo);

    // Batch-delete zeroed items when app closes
    window.addEventListener('pagehide', () => {
      codeReader?.reset();
      if (!zeroedItems.size) return;
      fetch('/api/fridge/delete-batch', {
        method: 'POST',
        headers,
        body: JSON.stringify({ names: [...zeroedItems] }),
        keepalive: true,
      }).catch(() => {});
    });

    // ── INIT ──────────────────────────────────────────────────────────────────

    async function loadItems() {
      renderChips();
      renderSkeleton();
      try {
        const res = await fetch('/api/fridge', { headers });
        if (!res.ok) {
          const debug = `platform=${tg.platform} version=${tg.version} initDataLen=${initData.length}`;
          document.getElementById('items-grid').innerHTML =
            `<div class="empty-state"><div class="icon">⚠️</div><p>Nicht autorisiert (HTTP ${res.status})</p><p style="font-size:11px;opacity:.6;margin-top:8px;">${debug}</p></div>`;
          return;
        }
        const items = await res.json();
        renderItems(items);
      } catch {
        document.getElementById('items-grid').innerHTML =
          '<div class="empty-state"><div class="icon">⚠️</div><p>Fehler beim Laden</p></div>';
      }
    }

    loadItems();

    // ── SHEET DRAG-TO-CLOSE ───────────────────────────────────────────────────
    // Nach unten wischen schließt das Sheet; preventDefault verhindert, dass
    // die Geste stattdessen die Liste im Hintergrund scrollt. Startet die
    // Geste auf einem Bedienelement (Input, Chip, Slider, Button), wird sie
    // ignoriert, damit dessen eigene Touch-Bedienung unangetastet bleibt.

    const SHEET_DRAG_IGNORE = 'input, .chip, .qty-btn, .detail-delete-btn, .detail-slider';

    function attachSheetSwipeDown(sheetEl, closeFn) {
      let startY = 0, dy = 0, tracking = false, dragging = false;

      sheetEl.addEventListener('touchstart', e => {
        tracking = !e.target.closest(SHEET_DRAG_IGNORE);
        if (!tracking) return;
        startY = e.touches[0].clientY;
        dy = 0;
        dragging = false;
      }, { passive: true });

      sheetEl.addEventListener('touchmove', e => {
        if (!tracking) return;
        const moveY = e.touches[0].clientY - startY;
        if (!dragging) {
          if (moveY < 4) return;
          dragging = true;
          sheetEl.style.transition = 'none';
        }
        dy = Math.max(0, moveY);
        sheetEl.style.transform = `translateY(${dy}px)`;
        e.preventDefault();
      }, { passive: false });

      sheetEl.addEventListener('touchend', () => {
        if (!tracking) return;
        tracking = false;
        if (!dragging) return;
        dragging = false;
        sheetEl.style.transition = '';
        sheetEl.style.transform = '';
        if (dy > 60) closeFn();
      }, { passive: true });
    }

    // ── DETAIL-SHEET (MHD, Menge, Kategorie) ─────────────────────────────────

    const detailOverlay  = document.getElementById('detail-overlay');
    const detailSheet    = document.getElementById('detail-sheet');
    const detailNameEl   = document.getElementById('detail-name');
    const detailExpiry   = document.getElementById('detail-expiry');
    const detailAmountField = document.getElementById('detail-amount-field');
    const detailQtyDisplay  = document.getElementById('detail-qty-display');
    const detailSlider      = document.getElementById('detail-slider');

    // Schrittweite je Einheit: g/ml → 10, kg/l → 0,1, sonst (Stk/Pkg/…) → 0,5
    function stepFor(unit) {
      if (unit === 'g' || unit === 'ml') return 10;
      if (unit === 'kg' || unit === 'l') return 0.1;
      return 0.5;
    }

    function round2(n) { return Math.round(n * 100) / 100; }

    function updateAmountUI() {
      const zeroed = zeroedItems.has(currentItem.name);
      const qty = zeroed ? 0 : currentItem.quantity;
      const full = currentItem.fullQuantity;
      const percentMode = isPercentItem(currentItem);

      detailQtyDisplay.textContent = pillFor({ ...currentItem, quantity: qty });

      if (percentMode) {
        const pct = full ? Math.round((qty / full) * 100) : 0;
        detailSlider.min = 0; detailSlider.max = 100; detailSlider.step = 1;
        detailSlider.value = pct;
      } else {
        detailSlider.min = 0; detailSlider.max = full != null ? full : qty; detailSlider.step = 0.5;
        detailSlider.value = qty;
      }
    }

    function renderDetail() {
      detailNameEl.textContent = currentItem.name;

      document.querySelectorAll('#detail-category-chips .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.category === currentItem.category);
      });

      detailExpiry.value = currentItem.expiryDate ?? '';

      if (currentItem.quantity == null) {
        detailAmountField.style.display = 'none';
        return;
      }
      detailAmountField.style.display = '';
      updateAmountUI();
    }

    function openDetail(name) {
      const item = allItems.find(i => i.name === name);
      if (!item) return;
      currentItem = item;
      renderDetail();
      detailOverlay.classList.add('visible');
      detailSheet.classList.add('open');
    }

    function closeDetail() {
      detailSheet.classList.remove('open');
      detailOverlay.classList.remove('visible');
      currentItem = null;
    }

    detailOverlay.addEventListener('click', closeDetail);
    attachSheetSwipeDown(detailSheet, closeDetail);

    // Kategorie ändern
    document.getElementById('detail-category-chips').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip || !currentItem) return;
      currentItem.category = chip.dataset.category;
      document.querySelectorAll('#detail-category-chips .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      applyFilter(document.getElementById('search').value);
      tg.HapticFeedback?.notificationOccurred('success');
      patchItem(currentItem.name, { category: currentItem.category });
    });

    // MHD
    function commitExpiry(value) {
      currentItem.expiryDate = value;
      detailExpiry.value = value ?? '';
      applyFilter(document.getElementById('search').value);
      tg.HapticFeedback?.notificationOccurred('success');
      patchItem(currentItem.name, { expiryDate: value });
    }

    detailExpiry.addEventListener('change', () => {
      if (!currentItem) return;
      commitExpiry(detailExpiry.value || null);
    });

    document.querySelectorAll('#detail-expiry-chips .chip[data-days]').forEach(chip => {
      chip.addEventListener('click', () => {
        if (!currentItem) return;
        const d = new Date();
        d.setDate(d.getDate() + parseInt(chip.dataset.days, 10));
        commitExpiry(d.toISOString().slice(0, 10));
      });
    });

    document.getElementById('detail-expiry-clear').addEventListener('click', () => {
      if (!currentItem) return;
      commitExpiry(null);
    });

    // Menge: gemeinsamer Commit-Pfad für Stepper & Slider
    function commitQty(newQty) {
      const full = currentItem.fullQuantity;
      const clamped = Math.max(0, full != null ? Math.min(full, newQty) : newQty);

      if (clamped <= 0) {
        zeroedItems.add(currentItem.name);
        updateAmountUI();
        tg.HapticFeedback?.notificationOccurred('warning');
        applyFilter(document.getElementById('search').value);
        return;
      }

      zeroedItems.delete(currentItem.name);
      currentItem.quantity = clamped;
      updateAmountUI();
      tg.HapticFeedback?.notificationOccurred('success');
      enableUndo();
      applyFilter(document.getElementById('search').value);
      patchItem(currentItem.name, { quantity: clamped });
    }

    function detailAdjustQty(dir) {
      const zeroed = zeroedItems.has(currentItem.name);
      if (zeroed) {
        if (dir < 0) return;
        zeroedItems.delete(currentItem.name);
        currentItem.quantity = Math.min(currentItem.fullQuantity ?? 1, 1);
        updateAmountUI();
        tg.HapticFeedback?.notificationOccurred('success');
        enableUndo();
        applyFilter(document.getElementById('search').value);
        patchItem(currentItem.name, { quantity: currentItem.quantity });
        return;
      }
      const step = stepFor(currentItem.unit) * dir;
      commitQty(round2(currentItem.quantity + step));
    }

    document.getElementById('detail-minus-btn').addEventListener('pointerdown', e => {
      const btn = e.currentTarget;
      btn.classList.add('pressing');
      btn.setPointerCapture(e.pointerId);
      startRepeat(() => detailAdjustQty(-1));
      const stop = () => { stopRepeat(); btn.classList.remove('pressing'); };
      btn.addEventListener('pointerup', stop, { once: true });
      btn.addEventListener('pointercancel', stop, { once: true });
    });

    document.getElementById('detail-plus-btn').addEventListener('pointerdown', e => {
      const btn = e.currentTarget;
      btn.classList.add('pressing');
      btn.setPointerCapture(e.pointerId);
      startRepeat(() => detailAdjustQty(1));
      const stop = () => { stopRepeat(); btn.classList.remove('pressing'); };
      btn.addEventListener('pointerup', stop, { once: true });
      btn.addEventListener('pointercancel', stop, { once: true });
    });

    // Slider: live während des Ziehens nur anzeigen, beim Loslassen committen
    detailSlider.addEventListener('input', () => {
      if (!currentItem) return;
      const raw = parseFloat(detailSlider.value);
      const qty = isPercentItem(currentItem)
        ? Math.round((raw / 100) * currentItem.fullQuantity)
        : raw;
      detailQtyDisplay.textContent = pillFor({ ...currentItem, quantity: qty });
    });

    detailSlider.addEventListener('change', () => {
      if (!currentItem) return;
      const raw = parseFloat(detailSlider.value);
      const qty = isPercentItem(currentItem)
        ? Math.round((raw / 100) * currentItem.fullQuantity)
        : raw;
      commitQty(qty);
    });

    // Löschen
    document.getElementById('detail-delete-btn').addEventListener('click', async () => {
      if (!currentItem) return;
      const name = currentItem.name;
      closeDetail();
      await deleteItem(name);
    });

    // ── ADD-SHEET ─────────────────────────────────────────────────────────────

    const fab      = document.getElementById('fab');
    const sheet    = document.getElementById('sheet');
    const overlay  = document.getElementById('sheet-overlay');
    const inpName  = document.getElementById('inp-name');
    const inpQty   = document.getElementById('inp-qty');
    const addBtn   = document.getElementById('add-btn');

    let selectedUnit = null;
    let selectedCategory = 'kuehlschrank';
    let categoryManuallySet = false;

    function setAddUnitChips(unit) {
      document.querySelectorAll('#add-unit-chips .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.unit === unit);
      });
    }

    function setAddCategoryChips(category) {
      document.querySelectorAll('#add-category-chips .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.category === category);
      });
    }

    function openSheet() {
      overlay.classList.add('visible');
      sheet.classList.add('open');
      setTimeout(() => inpName.focus(), 320);
    }

    function closeSheet() {
      sheet.classList.remove('open');
      overlay.classList.remove('visible');
      inpName.value = '';
      inpQty.value  = '';
      selectedUnit = null;
      setAddUnitChips(selectedUnit);
      selectedCategory = 'kuehlschrank';
      categoryManuallySet = false;
      setAddCategoryChips(selectedCategory);
      addBtn.disabled = true;
    }

    fab.addEventListener('click', () => {
      sheet.classList.contains('open') ? closeSheet() : openSheet();
    });
    overlay.addEventListener('click', closeSheet);

    inpName.addEventListener('input', () => {
      addBtn.disabled = !inpName.value.trim();
      if (!categoryManuallySet && inpName.value.trim()) {
        selectedCategory = guessCategory(inpName.value);
        setAddCategoryChips(selectedCategory);
      }
    });

    document.getElementById('add-unit-chips').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      selectedUnit = selectedUnit === chip.dataset.unit ? null : chip.dataset.unit;
      setAddUnitChips(selectedUnit);
    });

    document.getElementById('add-category-chips').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      selectedCategory = chip.dataset.category;
      categoryManuallySet = true;
      setAddCategoryChips(selectedCategory);
    });

    addBtn.addEventListener('click', async () => {
      const name = inpName.value.trim();
      if (!name) return;
      const qty  = inpQty.value !== '' ? parseFloat(inpQty.value) : null;
      const unit = selectedUnit;

      addBtn.disabled = true;
      try {
        const res   = await fetch('/api/fridge/add', {
          method: 'POST', headers,
          body: JSON.stringify({ name, quantity: qty, unit, category: selectedCategory }),
        });
        const { items } = await res.json();
        renderItems(items);
        tg.HapticFeedback?.notificationOccurred('success');
        closeSheet();
      } catch {
        addBtn.disabled = false;
        tg.HapticFeedback?.notificationOccurred('error');
      }
    });

    // Swipe sheet down to close
    attachSheetSwipeDown(sheet, closeSheet);

    // ── BARCODE-SCANNER ───────────────────────────────────────────────────────

    const scanOverlay  = document.getElementById('scan-overlay');
    const scanHint     = document.getElementById('scan-hint');
    let codeReader = null;
    let scanning   = false;

    async function openScanner() {
      scanOverlay.classList.add('visible');
      scanHint.textContent = 'Barcode ins Bild halten…';
      scanning = true;
      codeReader = new ZXing.BrowserMultiFormatReader();
      try {
        await codeReader.decodeFromConstraints(
          { video: { facingMode: 'environment' } },
          'scan-video',
          (result) => {
            if (result && scanning) {
              scanning = false;
              tg.HapticFeedback?.notificationOccurred('success');
              handleScanResult(result.getText());
            }
          }
        );
      } catch (e) {
        console.error('[scan] Kamera-Fehler:', e.message);
        closeScanner();
        tg.showAlert?.('Kamera konnte nicht gestartet werden.');
      }
    }

    function closeScanner() {
      scanning = false;
      codeReader?.reset();
      scanOverlay.classList.remove('visible');
    }

    async function handleScanResult(code) {
      closeScanner();
      try {
        const res  = await fetch('/api/fridge/barcode', {
          method: 'POST', headers, body: JSON.stringify({ code }),
        });
        const data = await res.json();
        openSheet();
        if (data.found && data.product) {
          inpName.value = data.product.name;
          inpQty.value  = data.product.quantity ?? '';
          selectedUnit  = data.product.unit ?? null;
          addBtn.disabled = !inpName.value.trim();
          setAddUnitChips(selectedUnit);
          selectedCategory = guessCategory(inpName.value);
          categoryManuallySet = false;
          setAddCategoryChips(selectedCategory);
        } else {
          tg.HapticFeedback?.notificationOccurred('warning');
        }
      } catch {
        openSheet();
        tg.HapticFeedback?.notificationOccurred('error');
      }
    }

    document.getElementById('scan-btn').addEventListener('click', openScanner);
    document.getElementById('scan-close-btn').addEventListener('click', closeScanner);
  </script>
</body>
</html>
